<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>WC26 Scoreboard — FIFA World Cup 2026 Matches &amp; Stats</title>
<meta name="description" content="Every match, every score, every group of the FIFA World Cup 2026 — live from open data.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<meta property="og:image" content="fwc26og.png">
<meta property="twitter:image" content="fwc26og.png">
  <style>
  :root{
    --pitch-dark:#0a2418;
    --pitch-mid:#0f3223;
    --pitch-line:#1c4a34;
    --chalk:#f2ede0;
    --chalk-dim:#9fb8ac;
    --gold:#e8b83c;
    --gold-dim:#8a6f2a;
    --scarlet:#e0584f;
    --sky:#5fb0c9;
    --radius:14px;
    --font-display:'Bebas Neue', sans-serif;
    --font-body:'Inter', sans-serif;
    --font-mono:'Space Mono', monospace;
    font-size:14px;
  }
  @media (min-width:640px){ :root{ font-size:15.5px; } }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(ellipse 900px 500px at 15% -10%, rgba(232,184,60,0.08), transparent 60%),
      linear-gradient(180deg, var(--pitch-dark), #081c13 60%, #061510);
    color:var(--chalk);
    font-family:var(--font-body);
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  a{color:inherit;}
  ::selection{background:var(--gold);color:#1a1206;}

  /* ---------- pitch stripe backdrop for header ---------- */
  .stripes{
    background-image:repeating-linear-gradient(100deg, var(--pitch-mid) 0 40px, var(--pitch-dark) 40px 80px);
  }

  header.hero{
    position:relative;
    padding:2.6rem 1.1rem 1.6rem;
    overflow:hidden;
    border-bottom:1px solid var(--pitch-line);
  }
  header.hero::before{
    content:"";
    position:absolute; inset:0;
    background-image:repeating-linear-gradient(100deg, rgba(255,255,255,0.025) 0 46px, transparent 46px 92px);
    pointer-events:none;
  }
  .hero-inner{position:relative; max-width:880px; margin:0 auto;}
  .eyebrow{
    font-family:var(--font-mono);
    letter-spacing:.18em;
    text-transform:uppercase;
    font-size:.68rem;
    color:var(--gold);
    display:flex; align-items:center; gap:.5em;
  }
  .eyebrow .dot{width:6px;height:6px;border-radius:50%;background:var(--gold);box-shadow:0 0 8px var(--gold);}
  h1.title{
    font-family:var(--font-display);
    font-weight:400;
    letter-spacing:.02em;
    font-size:clamp(2.6rem, 10vw, 4.6rem);
    line-height:.95;
    margin:.3rem 0 .5rem;
    color:var(--chalk);
  }
  h1.title span{color:var(--gold);}
  .hero-sub{
    color:var(--chalk-dim);
    font-size:.92rem;
    max-width:46ch;
    line-height:1.5;
    margin-bottom:1.3rem;
  }
  .hero-stats{display:flex; flex-wrap:wrap; gap:1.6rem;}
  .stat b{
    display:block;
    font-family:var(--font-mono);
    font-size:1.35rem;
    color:var(--gold);
  }
  .stat span{font-size:.68rem; color:var(--chalk-dim); text-transform:uppercase; letter-spacing:.08em;}

  /* ---------- controls ---------- */
  .controls{
    position:sticky; top:0; z-index:20;
    background:rgba(10,36,24,0.92);
    backdrop-filter:blur(10px);
    border-bottom:1px solid var(--pitch-line);
    padding:.7rem 1.1rem;
  }
  .controls-inner{max-width:880px; margin:0 auto; display:flex; flex-direction:column; gap:.6rem;}
  .tabbar{display:flex; gap:.4rem;}
  .tabbar button{
    flex:1;
    font-family:var(--font-mono);
    font-size:.72rem;
    letter-spacing:.06em;
    text-transform:uppercase;
    background:transparent;
    border:1px solid var(--pitch-line);
    color:var(--chalk-dim);
    padding:.55rem .4rem;
    border-radius:999px;
    cursor:pointer;
    transition:all .15s ease;
  }
  .tabbar button.active{
    background:var(--gold);
    border-color:var(--gold);
    color:#1a1206;
    font-weight:700;
  }
  .filters-row{display:flex; gap:.5rem; flex-wrap:wrap;}
  .filters-row select, .filters-row input{
    font-family:var(--font-body);
    font-size:.8rem;
    background:var(--pitch-mid);
    border:1px solid var(--pitch-line);
    color:var(--chalk);
    padding:.5rem .7rem;
    border-radius:10px;
    outline:none;
  }
  .filters-row select{flex:1; min-width:120px;}
  .filters-row input{flex:2; min-width:140px;}
  .filters-row select:focus, .filters-row input:focus{border-color:var(--gold);}
  .filters-row input::placeholder{color:var(--chalk-dim);}

  main{max-width:880px; margin:0 auto; padding:1.1rem 1.1rem 3rem;}

  #status-line{
    font-family:var(--font-mono);
    font-size:.72rem;
    color:var(--chalk-dim);
    margin:0 0 1rem;
    min-height:1.2em;
  }
  #status-line.err{color:var(--scarlet);}

  /* ---------- matchday group headers ---------- */
  .round-heading{
    font-family:var(--font-display);
    font-size:1.5rem;
    letter-spacing:.03em;
    color:var(--gold);
    margin:1.8rem 0 .7rem;
    padding-bottom:.35rem;
    border-bottom:1px dashed var(--pitch-line);
    display:flex; align-items:baseline; gap:.6rem;
  }
  .round-heading .count{
    font-family:var(--font-mono);
    font-size:.68rem;
    color:var(--chalk-dim);
    letter-spacing:.02em;
  }

  /* ---------- match card ---------- */
  .match-card{
    background:linear-gradient(180deg, var(--pitch-mid), rgba(15,50,35,0.5));
    border:1px solid var(--pitch-line);
    border-radius:var(--radius);
    padding:.75rem .9rem;
    margin-bottom:.55rem;
  }
  .match-top{
    display:flex; justify-content:space-between; align-items:center;
    font-family:var(--font-mono);
    font-size:.65rem;
    color:var(--chalk-dim);
    text-transform:uppercase;
    letter-spacing:.04em;
    margin-bottom:.55rem;
  }
  .badge{
    padding:.15rem .5rem;
    border-radius:999px;
    font-size:.62rem;
    font-weight:700;
    letter-spacing:.05em;
  }
  .badge.final{background:rgba(232,184,60,0.15); color:var(--gold); border:1px solid var(--gold-dim);}
  .badge.upcoming{background:rgba(95,176,201,0.13); color:var(--sky); border:1px solid rgba(95,176,201,0.35);}

  .teams-row{display:flex; align-items:center; gap:.5rem;}
  .team{
    flex:1; display:flex; align-items:center; gap:.5rem;
    min-width:0;
  }
  .team.away{flex-direction:row-reverse; text-align:right;}
  .team img{width:22px; height:16px; object-fit:cover; border-radius:2px; box-shadow:0 0 0 1px rgba(255,255,255,0.08); flex-shrink:0;}
  .team .flag-fallback{
    width:22px;height:16px;border-radius:2px;background:var(--pitch-line);
    display:flex;align-items:center;justify-content:center;font-size:.55rem;color:var(--chalk-dim);flex-shrink:0;
  }
  .team-name{
    font-weight:600;
    font-size:.86rem;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .team-name.winner{color:var(--gold);}

  .score-box{
    font-family:var(--font-mono);
    font-weight:700;
    font-size:1.05rem;
    background:#081b12;
    border:1px solid var(--pitch-line);
    border-radius:8px;
    padding:.3rem .55rem;
    min-width:58px;
    text-align:center;
    letter-spacing:.05em;
    flex-shrink:0;
  }
  .score-box.tbd{color:var(--chalk-dim); font-size:.68rem; font-weight:400;}

  .match-meta{
    margin-top:.5rem;
    font-size:.7rem;
    color:var(--chalk-dim);
    display:flex; flex-wrap:wrap; gap:.4rem .9rem;
  }
  .match-meta span{display:flex; align-items:center; gap:.3rem;}

  details.scorers{margin-top:.5rem;}
  details.scorers summary{
    cursor:pointer;
    font-size:.68rem;
    color:var(--sky);
    list-style:none;
    font-family:var(--font-mono);
  }
  details.scorers summary::-webkit-details-marker{display:none;}
  details.scorers summary::before{content:"⚽ goals ";}
  .scorers-list{
    margin-top:.4rem;
    font-size:.72rem;
    color:var(--chalk-dim);
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:.2rem .8rem;
  }
  .scorers-list .g-away{text-align:right;}

  .empty-msg{
    text-align:center;
    padding:2.5rem 1rem;
    color:var(--chalk-dim);
    font-size:.85rem;
  }

  /* ---------- standings ---------- */
  .group-block{
    background:var(--pitch-mid);
    border:1px solid var(--pitch-line);
    border-radius:var(--radius);
    padding:.8rem .8rem 1rem;
    margin-bottom:.9rem;
  }
  .group-block h3{
    font-family:var(--font-display);
    font-size:1.15rem;
    letter-spacing:.03em;
    color:var(--gold);
    margin:0 0 .5rem;
  }
  table.standings{width:100%; border-collapse:collapse; font-size:.72rem;}
  table.standings th{
    text-align:center;
    color:var(--chalk-dim);
    font-weight:600;
    font-family:var(--font-mono);
    font-size:.62rem;
    text-transform:uppercase;
    padding:.3rem .2rem;
    border-bottom:1px solid var(--pitch-line);
  }
  table.standings th:first-child{text-align:left; padding-left:.1rem;}
  table.standings td{
    text-align:center;
    padding:.38rem .2rem;
    border-bottom:1px solid rgba(28,74,52,0.5);
  }
  table.standings td.team-cell{
    text-align:left;
    display:flex; align-items:center; gap:.4rem;
    font-weight:600;
    padding-left:.1rem;
  }
  table.standings td.team-cell img{width:18px;height:13px;border-radius:2px; flex-shrink:0;}
  table.standings tr:nth-child(-n+2) td.team-cell{color:var(--gold);}
  table.standings td.pts{font-family:var(--font-mono); font-weight:700; color:var(--chalk);}

  footer{
    text-align:center;
    padding:2rem 1rem 2.5rem;
    font-size:.75rem;
    color:var(--chalk-dim);
    border-top:1px solid var(--pitch-line);
  }
  footer a{
    color:var(--gold);
    text-decoration:none;
    font-weight:700;
    font-family:var(--font-mono);
  }
  footer a:hover{text-decoration:underline;}

  @media (prefers-reduced-motion:no-preference){
    .match-card{animation:rise .35s ease both;}
  }
  @keyframes rise{
    from{opacity:0; transform:translateY(6px);}
    to{opacity:1; transform:translateY(0);}
  }
  :focus-visible{outline:2px solid var(--gold); outline-offset:2px;}
</style>
</head>
<body>

<header class="hero stripes">
  <div class="hero-inner">
    <div class="eyebrow"><span class="dot"></span> Canada · Mexico · USA</div>
    <h1 class="title">WORLD CUP <span>2026</span></h1>
    <p class="hero-sub">Every fixture, every score, every group of the 48-team tournament — pulled live from open public match data.</p>
    <div class="hero-stats">
      <div class="stat"><b id="stat-total">104</b><span>Matches</span></div>
      <div class="stat"><b id="stat-played">–</b><span>Played</span></div>
      <div class="stat"><b>48</b><span>Teams</span></div>
      <div class="stat"><b>16</b><span>Host cities</span></div>
    </div>
  </div>
</header>

<div class="controls">
  <div class="controls-inner">
    <div class="tabbar">
      <button class="tab-btn active" data-tab="matches">Matches</button>
      <button class="tab-btn" data-tab="standings">Group Standings</button>
    </div>
    <div class="filters-row" id="matches-filters">
      <select id="round-select"><option value="all">All rounds</option></select>
      <select id="group-select"><option value="all">All groups</option></select>
      <input id="team-search" type="text" placeholder="Search a team…">
    </div>
  </div>
</div>

<main>
  <p id="status-line">Loading match data…</p>
  <div id="matches-view"></div>
  <div id="standings-view" style="display:none;"></div>
</main>

<footer>
  ©MAHIN · <a href="https://www.facebook.com/mahin728" target="_blank" rel="noopener">facebook.com/mahin728</a>
</footer>

<script>
(function(){
  "use strict";

  var DATA_URL = "https://raw.githubusercontent.com/openfootball/worldcup.json/master/2026/worldcup.json";

  var FLAGS = {
    "Mexico":"mx","South Africa":"za","South Korea":"kr","Czech Republic":"cz",
    "Canada":"ca","Bosnia & Herzegovina":"ba","Qatar":"qa","Switzerland":"ch",
    "Brazil":"br","Morocco":"ma","Haiti":"ht","Scotland":"gb-sct",
    "USA":"us","Paraguay":"py","Australia":"au","Turkey":"tr",
    "Germany":"de","Curaçao":"cw","Ivory Coast":"ci","Ecuador":"ec",
    "Netherlands":"nl","Japan":"jp","Sweden":"se","Tunisia":"tn",
    "Belgium":"be","Egypt":"eg","Iran":"ir","New Zealand":"nz",
    "Spain":"es","Cape Verde":"cv","Saudi Arabia":"sa","Uruguay":"uy",
    "France":"fr","Senegal":"sn","Iraq":"iq","Norway":"no",
    "Argentina":"ar","Algeria":"dz","Austria":"at","Jordan":"jo",
    "Portugal":"pt","DR Congo":"cd","Uzbekistan":"uz","Colombia":"co",
    "England":"gb-eng","Croatia":"hr","Ghana":"gh","Panama":"pa"
  };

  var els = {
    status: document.getElementById("status-line"),
    matchesView: document.getElementById("matches-view"),
    standingsView: document.getElementById("standings-view"),
    roundSelect: document.getElementById("round-select"),
    groupSelect: document.getElementById("group-select"),
    teamSearch: document.getElementById("team-search"),
    statTotal: document.getElementById("stat-total"),
    statPlayed: document.getElementById("stat-played"),
    filtersRow: document.getElementById("matches-filters"),
    tabBtns: document.querySelectorAll(".tab-btn")
  };

  var allMatches = [];

  function flagImg(name, cls){
    var code = FLAGS[name];
    if(code){
      return '<img class="'+(cls||'')+'" src="https://flagcdn.com/24x18/'+code+'.png" alt="" loading="lazy">';
    }
    return '<span class="flag-fallback">'+ (name||'?').slice(0,2).toUpperCase() +'</span>';
  }

  function fmtDate(dateStr){
    if(!dateStr) return "";
    var d = new Date(dateStr + "T00:00:00Z");
    return d.toLocaleDateString(undefined, {weekday:'short', month:'short', day:'numeric', timeZone:'UTC'});
  }

  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g, function(c){
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
    });
  }

  function matchStatus(m){
    return (m.score && m.score.ft) ? "final" : "upcoming";
  }

  function renderScorers(m){
    var g1 = m.goals1 || [], g2 = m.goals2 || [];
    if(!g1.length && !g2.length) return "";
    var maxLen = Math.max(g1.length, g2.length);
    var rows = "";
    for(var i=0;i<maxLen;i++){
      var a = g1[i], b = g2[i];
      rows += '<div class="g-home">'+ (a ? escapeHtml(a.name)+" "+a.minute+"'"+(a.penalty?" (P)":a.owngoal?" (OG)":"") : "") +'</div>';
      rows += '<div class="g-away">'+ (b ? escapeHtml(b.name)+" "+b.minute+"'"+(b.penalty?" (P)":b.owngoal?" (OG)":"") : "") +'</div>';
    }
    return '<details class="scorers"><summary>goal scorers</summary><div class="scorers-list">'+rows+'</div></details>';
  }

  function matchCard(m){
    var status = matchStatus(m);
    var t1 = m.team1, t2 = m.team2;
    var score1 = status==="final" ? m.score.ft[0] : null;
    var score2 = status==="final" ? m.score.ft[1] : null;
    var w1 = status==="final" && score1 > score2;
    var w2 = status==="final" && score2 > score1;

    var scoreHtml = status==="final"
      ? '<div class="score-box">'+score1+' – '+score2+'</div>'
      : '<div class="score-box tbd">'+ (m.time ? m.time.split(' ')[0] : 'TBD') +'</div>';

    var badge = status==="final"
      ? '<span class="badge final">Full Time</span>'
      : '<span class="badge upcoming">Upcoming</span>';

    return ''+
    '<div class="match-card" data-round="'+escapeHtml(m.round)+'" data-group="'+escapeHtml(m.group||'')+'" data-teams="'+escapeHtml((t1+' '+t2).toLowerCase())+'" data-status="'+status+'">'+
      '<div class="match-top">'+
        '<span>'+ fmtDate(m.date) + (m.num ? ' · #'+m.num : '') +'</span>'+
        badge+
      '</div>'+
      '<div class="teams-row">'+
        '<div class="team home">'+ flagImg(t1) + '<span class="team-name'+(w1?' winner':'')+'">'+escapeHtml(t1)+'</span></div>'+
        scoreHtml+
        '<div class="team away">'+ flagImg(t2) + '<span class="team-name'+(w2?' winner':'')+'">'+escapeHtml(t2)+'</span></div>'+
      '</div>'+
      '<div class="match-meta">'+
        '<span>📍 '+escapeHtml(m.ground||'TBD')+'</span>'+
        (m.group ? '<span>🏆 '+escapeHtml(m.group)+'</span>' : '')+
        (m.time ? '<span>🕒 '+escapeHtml(m.time)+'</span>' : '')+
      '</div>'+
      renderScorers(m)+
    '</div>';
  }

  function groupOrderIndex(round){
    var mIdx = round.indexOf("Matchday");
    if(mIdx===0){
      return parseInt(round.replace("Matchday ",""),10);
    }
    var known = ["Round of 32","Round of 16","Quarter-final","Semi-final","Match for third place","Final"];
    var i = known.indexOf(round);
    return i>=0 ? 100+i : 999;
  }

  function renderMatches(){
    var roundVal = els.roundSelect.value;
    var groupVal = els.groupSelect.value;
    var term = els.teamSearch.value.trim().toLowerCase();

    var filtered = allMatches.filter(function(m){
      if(roundVal!=="all" && m.round!==roundVal) return false;
      if(groupVal!=="all" && m.group!==groupVal) return false;
      if(term && !((m.team1+' '+m.team2).toLowerCase().indexOf(term)>-1)) return false;
      return true;
    });

    if(!filtered.length){
      els.matchesView.innerHTML = '<p class="empty-msg">No matches found for this filter. Try clearing your search.</p>';
      return;
    }

    var byRound = {};
    var order = [];
    filtered.forEach(function(m){
      if(!byRound[m.round]){ byRound[m.round]=[]; order.push(m.round); }
      byRound[m.round].push(m);
    });
    order.sort(function(a,b){ return groupOrderIndex(a)-groupOrderIndex(b); });

    var html = "";
    order.forEach(function(round){
      var list = byRound[round];
      html += '<div class="round-heading">'+escapeHtml(round)+' <span class="count">'+list.length+' match'+(list.length>1?'es':'')+'</span></div>';
      list.forEach(function(m){ html += matchCard(m); });
    });
    els.matchesView.innerHTML = html;
  }

  function computeStandings(){
    var groups = {};
    allMatches.forEach(function(m){
      if(!m.group) return;
      if(!groups[m.group]) groups[m.group] = {};
      var g = groups[m.group];
      [m.team1, m.team2].forEach(function(t){
        if(t && !g[t]) g[t] = {team:t, p:0,w:0,d:0,l:0,gf:0,ga:0,pts:0};
      });
      if(m.score && m.score.ft && g[m.team1] && g[m.team2]){
        var s1 = m.score.ft[0], s2 = m.score.ft[1];
        var a = g[m.team1], b = g[m.team2];
        a.p++; b.p++;
        a.gf+=s1; a.ga+=s2;
        b.gf+=s2; b.ga+=s1;
        if(s1>s2){ a.w++; a.pts+=3; b.l++; }
        else if(s2>s1){ b.w++; b.pts+=3; a.l++; }
        else { a.d++; b.d++; a.pts++; b.pts++; }
      }
    });
    return groups;
  }

  function renderStandings(){
    var groups = computeStandings();
    var letters = Object.keys(groups).sort();
    if(!letters.length){
      els.standingsView.innerHTML = '<p class="empty-msg">Standings unavailable.</p>';
      return;
    }
    var html = "";
    letters.forEach(function(letter){
      var teams = Object.values(groups[letter]).sort(function(a,b){
        if(b.pts!==a.pts) return b.pts-a.pts;
        var gdA=a.gf-a.ga, gdB=b.gf-b.ga;
        if(gdB!==gdA) return gdB-gdA;
        return b.gf-a.gf;
      });
      html += '<div class="group-block"><h3>'+escapeHtml(letter)+'</h3>'+
        '<table class="standings"><thead><tr>'+
        '<th>Team</th><th>P</th><th>W</th><th>D</th><th>L</th><th>GF</th><th>GA</th><th>GD</th><th>Pts</th>'+
        '</tr></thead><tbody>';
      teams.forEach(function(t){
        html += '<tr>'+
          '<td class="team-cell">'+flagImg(t.team)+'<span>'+escapeHtml(t.team)+'</span></td>'+
          '<td>'+t.p+'</td><td>'+t.w+'</td><td>'+t.d+'</td><td>'+t.l+'</td>'+
          '<td>'+t.gf+'</td><td>'+t.ga+'</td><td>'+(t.gf-t.ga)+'</td>'+
          '<td class="pts">'+t.pts+'</td>'+
        '</tr>';
      });
      html += '</tbody></table></div>';
    });
    els.standingsView.innerHTML = html;
  }

  function populateFilterOptions(){
    var rounds = [];
    var groups = [];
    allMatches.forEach(function(m){
      if(rounds.indexOf(m.round)===-1) rounds.push(m.round);
      if(m.group && groups.indexOf(m.group)===-1) groups.push(m.group);
    });
    rounds.sort(function(a,b){ return groupOrderIndex(a)-groupOrderIndex(b); });
    groups.sort();

    rounds.forEach(function(r){
      var opt = document.createElement("option");
      opt.value = r; opt.textContent = r;
      els.roundSelect.appendChild(opt);
    });
    groups.forEach(function(g){
      var opt = document.createElement("option");
      opt.value = g; opt.textContent = g;
      els.groupSelect.appendChild(opt);
    });
  }

  function switchTab(tab){
    els.tabBtns.forEach(function(b){ b.classList.toggle("active", b.dataset.tab===tab); });
    els.matchesView.style.display = tab==="matches" ? "" : "none";
    els.standingsView.style.display = tab==="standings" ? "" : "none";
    els.filtersRow.style.display = tab==="matches" ? "flex" : "none";
  }

  els.tabBtns.forEach(function(b){
    b.addEventListener("click", function(){ switchTab(b.dataset.tab); });
  });
  els.roundSelect.addEventListener("change", renderMatches);
  els.groupSelect.addEventListener("change", renderMatches);
  els.teamSearch.addEventListener("input", renderMatches);

  fetch(DATA_URL)
    .then(function(res){
      if(!res.ok) throw new Error("HTTP "+res.status);
      return res.json();
    })
    .then(function(data){
      allMatches = data.matches || [];
      var played = allMatches.filter(function(m){ return m.score && m.score.ft; }).length;
      els.statTotal.textContent = allMatches.length;
      els.statPlayed.textContent = played;
      els.status.textContent = "Live from openfootball/worldcup.json — "+played+" of "+allMatches.length+" matches played.";
      populateFilterOptions();
      renderMatches();
      renderStandings();
    })
    .catch(function(err){
      els.status.textContent = "Couldn't load live match data ("+err.message+"). Please check your connection and reload.";
      els.status.classList.add("err");
    });

})();
</script>
</body>
</html>
