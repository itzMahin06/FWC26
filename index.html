<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ফিফা বিশ্বকাপ ২০২৬ | FIFA World Cup 2026</title>
<link href="https://fonts.maateen.me/solaiman-lipi/font.css" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  * { font-family: 'SolaimanLipi', 'Kalpurush', serif; }
  :root {
    --gold: #FFD700;
    --gold-dark: #c9a227;
    --dark: #0a0e1a;
    --darker: #060911;
    --card: #111827;
    --card2: #1a2235;
    --accent: #00c9ff;
    --green: #00e676;
    --red: #ff1744;
    --text: #e2e8f0;
    --muted: #94a3b8;
  }
  body { background: var(--dark); color: var(--text); margin:0; padding:0; overflow-x:hidden; }
  
  /* HERO */
  .hero {
    background: linear-gradient(135deg, #060911 0%, #0f172a 40%, #1a0a2e 100%);
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 30% 50%, rgba(0,201,255,0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(255,215,0,0.06) 0%, transparent 50%);
  }
  .hero-pitch {
    position: absolute; bottom: 0; left: 0; right: 0; height: 200px;
    background: linear-gradient(to top, rgba(0,100,50,0.15), transparent);
    overflow: hidden;
  }
  .hero-pitch::after {
    content: '';
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 300px; height: 300px;
    border: 2px solid rgba(255,255,255,0.04);
    border-radius: 50%;
  }
  .trophy-glow {
    text-shadow: 0 0 40px rgba(255,215,0,0.6), 0 0 80px rgba(255,215,0,0.3);
    animation: pulse-gold 3s ease-in-out infinite;
  }
  @keyframes pulse-gold {
    0%,100% { text-shadow: 0 0 40px rgba(255,215,0,0.6), 0 0 80px rgba(255,215,0,0.3); }
    50% { text-shadow: 0 0 60px rgba(255,215,0,0.9), 0 0 120px rgba(255,215,0,0.5); }
  }

  /* TABS */
  .tab-btn {
    padding: 12px 28px;
    border-radius: 40px;
    border: 1.5px solid rgba(255,215,0,0.25);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.3s;
    font-family: 'SolaimanLipi', serif;
    font-size: 15px;
    letter-spacing: 0.3px;
  }
  .tab-btn:hover { border-color: var(--gold); color: var(--gold); }
  .tab-btn.active {
    background: linear-gradient(135deg, var(--gold-dark), var(--gold));
    border-color: transparent;
    color: #000;
    font-weight: 700;
    box-shadow: 0 4px 20px rgba(255,215,0,0.35);
  }

  /* CARDS */
  .team-card {
    background: linear-gradient(145deg, var(--card), var(--card2));
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 16px;
    padding: 20px;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
    position: relative;
    overflow: hidden;
  }
  .team-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .team-card:hover { transform: translateY(-6px); border-color: rgba(255,215,0,0.3); box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
  .team-card:hover::before { opacity: 1; }
  .team-card.selected { border-color: var(--gold); box-shadow: 0 0 30px rgba(255,215,0,0.2); }

  /* PLAYER CARD */
  .player-card {
    background: var(--card2);
    border: 1px solid rgba(255,255,255,0.05);
    border-radius: 12px;
    padding: 16px 12px;
    text-align: center;
    transition: transform 0.2s, border-color 0.2s;
  }
  .player-card:hover { transform: translateY(-3px); border-color: rgba(0,201,255,0.4); }
  .player-img {
    width: 72px; height: 72px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid rgba(255,215,0,0.4);
    background: var(--card);
    margin: 0 auto 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px;
  }
  .pos-badge {
    display: inline-block;
    padding: 2px 10px; border-radius: 20px;
    font-size: 11px; font-weight: 700;
  }
  .pos-GK { background: rgba(255,215,0,0.15); color: var(--gold); border: 1px solid rgba(255,215,0,0.3); }
  .pos-DEF { background: rgba(0,201,255,0.12); color: var(--accent); border: 1px solid rgba(0,201,255,0.25); }
  .pos-MID { background: rgba(0,230,118,0.12); color: var(--green); border: 1px solid rgba(0,230,118,0.25); }
  .pos-FWD { background: rgba(255,23,68,0.12); color: var(--red); border: 1px solid rgba(255,23,68,0.25); }

  /* SCHEDULE TABLE */
  .match-row {
    background: var(--card);
    border: 1px solid rgba(255,255,255,0.05);
    border-radius: 12px;
    margin-bottom: 8px;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .match-row:hover { border-color: rgba(255,215,0,0.2); }
  .match-live { border-color: rgba(0,230,118,0.5) !important; animation: live-pulse 2s infinite; }
  @keyframes live-pulse {
    0%,100% { box-shadow: 0 0 0 0 rgba(0,230,118,0.3); }
    50% { box-shadow: 0 0 0 6px rgba(0,230,118,0); }
  }
  .match-finished { opacity: 0.75; }
  .live-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--green);
    animation: blink 1s infinite;
    display: inline-block;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  .countdown-box {
    font-size: 13px;
    font-weight: 700;
    color: var(--accent);
    background: rgba(0,201,255,0.08);
    border: 1px solid rgba(0,201,255,0.2);
    border-radius: 8px;
    padding: 4px 10px;
    white-space: nowrap;
  }
  .score-display {
    font-size: 22px; font-weight: 900;
    color: var(--gold);
    letter-spacing: 2px;
  }

  /* GROUP BADGE */
  .group-badge {
    background: linear-gradient(135deg, rgba(255,215,0,0.12), rgba(255,215,0,0.04));
    border: 1px solid rgba(255,215,0,0.25);
    color: var(--gold);
    font-size: 11px; font-weight: 700;
    padding: 2px 8px; border-radius: 6px;
  }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--darker); }
  ::-webkit-scrollbar-thumb { background: rgba(255,215,0,0.3); border-radius: 3px; }

  /* FLAG */
  .flag-img { font-size: 32px; line-height: 1; }

  /* LOADER */
  .loader {
    border: 3px solid rgba(255,215,0,0.2);
    border-top: 3px solid var(--gold);
    border-radius: 50%; width: 36px; height: 36px;
    animation: spin 0.8s linear infinite;
    margin: 0 auto;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* SECTION HEADER */
  .section-divider {
    display: flex; align-items: center; gap: 16px; margin: 24px 0 16px;
  }
  .section-divider::before, .section-divider::after {
    content: ''; flex: 1; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,215,0,0.3), transparent);
  }

  /* FILTER BUTTONS */
  .filter-btn {
    padding: 6px 14px; border-radius: 20px; font-size: 13px;
    border: 1px solid rgba(255,255,255,0.1);
    background: transparent; color: var(--muted); cursor: pointer;
    transition: all 0.2s; font-family: 'SolaimanLipi', serif;
  }
  .filter-btn:hover { border-color: var(--gold); color: var(--gold); }
  .filter-btn.active { background: rgba(255,215,0,0.12); border-color: var(--gold); color: var(--gold); }

  .fade-in { animation: fadeIn 0.4s ease; }
  @keyframes fadeIn { from { opacity:0; transform: translateY(10px); } to { opacity:1; transform: none; } }

  .stats-bar {
    background: linear-gradient(135deg, var(--card), var(--card2));
    border-radius: 12px; padding: 14px 20px;
    border: 1px solid rgba(255,255,255,0.05);
  }
</style>
</head>

      <div id="players-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-3"></div>
    </div>
  </div>

  <!-- SCHEDULE TAB -->
  <div id="tab-schedule" class="hidden fade-in">
    <div class="section-divider mt-6">
      <span style="color:var(--gold);font-weight:700;font-size:16px;">ম্যাচ সময়সূচি</span>

    <!-- Filter bar -->
    <div class="flex flex-wrap gap-2 mb-4 items-center">
      <span style="color:var(--muted);font-size:13px;">ফিল্টার:</span>
      <button class="filter-btn active" onclick="filterMatches('all',this)">সকল</button>

      <button class="filter-btn" onclick="filterMatches('upcoming',this)">⏳ আসন্ন</button>

    <!-- Search -->

        style="background:var(--card);border:1px solid rgba(255,255,255,0.1);color:var(--text);font-family:'SolaimanLipi',serif;">

      <div class="col-span-2 text-center">কাউন্টডাউন / ফলাফল</div>
    </div>

    <div id="schedule-list">
      <div class="flex justify-center py-10"><div class="loader"></div></div>
    </div>
  </div>

</div>

const MONTHS_BN = ["জানুয়ারি","ফেব্রুয়ারি","মার্চ","এপ্রিল","মে","জুন","জুলাই","আগস্ট","সেপ্টেম্বর","অক্টোবর","নভেম্বর","ডিসেম্বর"];
const DAYS_BN = ["রবিবার","সোমবার","মঙ্গলবার","বুধবার","বৃহস্পতিবার","শুক্রবার","শনিবার"];

function toBengaliNum(n) {
  return String(n).replace(/[0-9]/g, d => '০১২৩৪৫৬৭৮৯'[d]);
}

function formatDateBN(dateStr) {
  const d = new Date(dateStr);
  return `${DAYS_BN[d.getDay()]}, ${toBengaliNum(d.getDate())} ${MONTHS_BN[d.getMonth()]} ${toBengaliNum(d.getFullYear())}`;
}

// Parse UTC offset from time string like "13:00 UTC-6"
function parseMatchDateTime(dateStr, timeStr) {
  const match = timeStr.match(/(\d+):(\d+)\s+UTC([+-]\d+)/);
  if (!match) return null;
  const h = parseInt(match[1]), m = parseInt(match[2]), off = parseInt(match[3]);
  // Convert to UTC
  const utcH = h - off;
  const d = new Date(dateStr + 'T00:00:00Z');
  d.setUTCHours(utcH, m, 0, 0);
  return d;
}

// Convert UTC to Bangladesh time (UTC+6)
function toBDTime(utcDate) {
  const bd = new Date(utcDate.getTime() + 6*3600*1000);
  return bd;
}

function formatTimeBD(utcDate) {
  const bd = toBDTime(utcDate);
  let h = bd.getUTCHours(), m = bd.getUTCMinutes();
  const ampm = h >= 12 ? 'অপরাহ্ণ' : 'পূর্বাহ্ণ';
  if (h > 12) h -= 12;
  if (h === 0) h = 12;
  return `${toBengaliNum(h)}:${toBengaliNum(String(m).padStart(2,'0'))} ${ampm}`;
}

function getCountdown(utcDate) {
  const now = new Date();
  const diff = utcDate - now;
  if (diff < -7200000) return {type:'finished', text:''};
  if (diff < 0 && diff >= -7200000) return {type:'live', text:'খেলা চলছে'};
  const days = Math.floor(diff / 86400000);
  const hrs = Math.floor((diff % 86400000) / 3600000);
  const mins = Math.floor((diff % 3600000) / 60000);
  const secs = Math.floor((diff % 60000) / 1000);
  if (days > 0) return {type:'upcoming', text:`${toBengaliNum(days)}দি ${toBengaliNum(hrs)}ঘ ${toBengaliNum(mins)}মি`};
  if (hrs > 0) return {type:'upcoming', text:`${toBengaliNum(hrs)}ঘ ${toBengaliNum(mins)}মি ${toBengaliNum(secs)}সে`};
  return {type:'upcoming', text:`${toBengaliNum(mins)}মি ${toBengaliNum(secs)}সে`};
}

function teamBN(t) {
  return TEAM_NAME_BN[t] || t;
}

function teamFlag(t) {
  return TEAM_FLAGS[t] || '🏳';
}

    allMatches = (data.matches || []).map((m, i) => ({...m, _idx: i+1, _utc: parseMatchDateTime(m.date, m.time)}));

        <div class="hidden md:grid grid-cols-12 gap-2 items-center">
          <div class="col-span-1 text-center" style="color:var(--muted);font-size:13px;">${toBengaliNum(idx+1)}</div>
          <div class="col-span-2">
            <div style="font-size:12px;font-weight:600;">${dateDisp.split(',')[0]}, ${toBengaliNum(new Date(m.date).getDate())} ${MONTHS_BN[new Date(m.date).getMonth()]}</div>
            <div style="font-size:11px;color:var(--muted);">📍 ${m.ground||''}</div>
          </div>
          <div class="col-span-1 text-center" style="font-size:12px;color:var(--accent);">${bdTime}</div>
          <div class="col-span-4">
            <div class="flex items-center justify-center gap-3">
              <div class="flex items-center gap-2 flex-1 justify-end">
                <span style="font-size:14px;font-weight:700;">${t1bn}</span>
                <span style="font-size:24px;">${f1}</span>
              </div>
              <div style="color:var(--muted);font-size:12px;min-width:28px;text-align:center;">বনাম</div>
              <div class="flex items-center gap-2 flex-1">
                <span style="font-size:24px;">${f2}</span>
                <span style="font-size:14px;font-weight:700;">${t2bn}</span>
              </div>
            </div>
          </div>
          <div class="col-span-2 text-center">
            <div style="font-size:11px;color:var(--muted);">${roundBN}</div>
            ${groupStr}
          </div>
          <div class="col-span-2 text-center">${statusHtml}</div>
        </div>
      </div>
    </div>`;
  }).join('');
}

function updateCountdowns() {
  const filtered = getFilteredMatches();
  filtered.forEach(m => {
    if (!m._utc) return;
    const cd = getCountdown(m._utc);
    const el = document.getElementById(`cd-${m._idx}`);
    const row = document.getElementById(`match-${m._idx}`);
    if (cd.type === 'upcoming' && el) {
      el.textContent = cd.text;
    } else if (cd.type === 'live' && row && !row.classList.contains('match-live')) {
      renderSchedule(); // Re-render if status changed
    }
  });
}

function getFilteredMatches() {
  const search = (document.getElementById('match-search')?.value || '').toLowerCase();
  return allMatches.filter(m => {
    const cd = m._utc ? getCountdown(m._utc) : {type:'upcoming'};
    let pass = true;
    if (currentFilter === 'live') pass = cd.type === 'live';
    else if (currentFilter === 'upcoming') pass = cd.type === 'upcoming';
    else if (currentFilter === 'finished') pass = cd.type === 'finished';
    else if (currentFilter === 'group') pass = m.round && m.round.startsWith('Matchday');
    else if (currentFilter === 'knockout') pass = m.round && !m.round.startsWith('Matchday');
    if (search) {
      const t = (teamBN(m.team1)+teamBN(m.team2)+m.team1+m.team2+(m.group||'')).toLowerCase();
      pass = pass && t.includes(search);
    }
    return pass;
  });
}

function filterMatches(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderSchedule();
}

function searchMatches() { renderSchedule(); }

// ======== TEAMS =========
function renderTeams(groupFilter) {
  const grid = document.getElementById('teams-grid');
  let html = '';
  for (const [g, teams] of Object.entries(TEAMS_DATA)) {
    if (groupFilter && groupFilter !== 'all' && groupFilter !== g) continue;
    teams.forEach(t => {
      html += `<div class="team-card" onclick="showPlayers('${t.code}','${t.name}','${t.flag}','${g}')">
        <div class="flag-img text-center mb-2">${t.flag}</div>
        <div class="text-center font-bold text-sm leading-tight">${t.name}</div>
        <div class="text-center mt-1"><span class="group-badge">গ্রুপ ${g}</span></div>
        <div class="text-center mt-1" style="font-size:11px;color:var(--muted);">${t.code}</div>
      </div>`;
    });
  }
  grid.innerHTML = html || '<div style="color:var(--muted)">কোনো দল পাওয়া যায়নি</div>';
}

function renderGroupFilters() {
  const el = document.getElementById('group-filters');
  let html = '<button class="filter-btn active" onclick="setGroupFilter(\'all\',this)">সকল গ্রুপ</button>';
  for (const g of Object.keys(TEAMS_DATA)) {
    html += `<button class="filter-btn" onclick="setGroupFilter('${g}',this)">গ্রুপ ${g}</button>`;
  }
  el.innerHTML = html;
}

function setGroupFilter(g, btn) {
  document.querySelectorAll('#group-filters .filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderTeams(g);
}

function showPlayers(code, name, flag, group) {
  document.getElementById('teams-list-view').classList.add('hidden');
  const pv = document.getElementById('player-view');
  pv.classList.remove('hidden');

  // Header
  const teamObj = TEAMS_DATA[group]?.find(t=>t.code===code);
  document.getElementById('team-detail-header').innerHTML = `
    <div style="font-size:56px;line-height:1">${flag}</div>
    <div>
      <div style="font-size:22px;font-weight:900;">${name}</div>
      <div class="flex items-center gap-2 mt-1">
        <span class="group-badge">গ্রুপ ${group}</span>
        <span style="color:var(--muted);font-size:13px;">${code}</span>
      </div>
    </div>`;

  const players = PLAYER_DATA[code]?.players || [];
  const pg = document.getElementById('players-grid');

  if (!players.length) {
    pg.innerHTML = `<div class="col-span-full text-center py-10" style="color:var(--muted)">
      <div style="font-size:48px;margin-bottom:12px;">⚽</div>
      <div>এই দলের খেলোয়াড়দের তথ্য লোড হচ্ছে...</div>
      <div style="font-size:13px;margin-top:8px;">FIFA-র অফিসিয়াল স্কোয়াড ঘোষণার পর আপডেট হবে।</div>
    </div>`;
    return;
  }

  const grouped = {GK:[], DEF:[], MID:[], FWD:[]};
  players.forEach(p => { if (grouped[p.pos]) grouped[p.pos].push(p); });
  const posBN = {GK:'গোলকিপার', DEF:'ডিফেন্ডার', MID:'মিডফিল্ডার', FWD:'ফরোয়ার্ড'};

  let html = '';
  for (const [pos, plist] of Object.entries(grouped)) {
    if (!plist.length) continue;
    html += `<div class="col-span-full mt-4 mb-2">
      <span class="pos-${pos} pos-badge text-sm px-3 py-1">${posBN[pos]}</span>
    </div>`;
    plist.forEach(p => {
      html += `<div class="player-card">
        <div class="player-img">${p.emoji}</div>
        <div style="font-size:13px;font-weight:700;line-height:1.3">${p.name}</div>
        <div class="mt-2"><span class="pos-badge pos-${p.pos}">${posBN[p.pos]}</span></div>
      </div>`;
    });
  }
  pg.innerHTML = html;
}

function backToTeams() {
  document.getElementById('player-view').classList.add('hidden');
  document.getElementById('teams-list-view').classList.remove('hidden');
}

// ======== TABS =========
function switchTab(tab) {
  document.getElementById('tab-teams').classList.toggle('hidden', tab !== 'teams');
  document.getElementById('tab-schedule').classList.toggle('hidden', tab !== 'schedule');
  document.querySelectorAll('.tab-btn').forEach((b,i) => {
    b.classList.toggle('active', (i===0 && tab==='teams') || (i===1 && tab==='schedule'));
  });
}

// ======== INIT =========
renderGroupFilters();
renderTeams();
loadMatches();
</script>
