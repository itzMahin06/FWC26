<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAHIN TV LIVE</title>
    <!-- Google Fonts for Modern Minimal Interface -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- HLS Core Engine for .m3u8 parsing -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    
    <style>
        :root {
            --bg-dark: #070a12;
            --panel-bg: rgba(15, 23, 42, 0.45);
            --accent: #2563eb;
            --text-main: #f8fafc;
            --text-muted: #64748b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            font-size: 11px; /* Small text design instruction */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            padding: 20px;
        }

        /* Container & Header Info Panels */
        .dashboard-header {
            width: 100%;
            max-width: 1100px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding: 0 4px;
        }

        .brand-zone h1 {
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            background: linear-gradient(to right, #3b82f6, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .brand-zone p {
            font-size: 9px;
            color: var(--text-muted);
        }

        /* Real-time Network Buffer Speed Indicator Badge */
        .stats-badge {
            background: var(--panel-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 5px 10px;
            border-radius: 6px;
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            gap: 6px;
            color: #34d399; /* Green active look */
            font-family: monospace;
            font-size: 10px;
        }

        .stats-badge span {
            color: var(--text-muted);
            font-family: 'Inter', sans-serif;
        }

        /* Large Video Stage Frame */
        .video-stage {
            position: relative;
            width: 100%;
            max-width: 1100px;
            aspect-ratio: 16 / 9;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.04);
            box-shadow: 0 30px 60px -15px rgba(0,0,0,0.8);
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* Custom Floating Watermark Logo Overlay */
        .watermark-overlay {
            position: absolute;
            bottom: 60px;
            left: 20px;
            z-index: 5;
            opacity: 0.25;
            width: 55px;
            height: auto;
            pointer-events: none;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Modern Interface Controls Wrap */
        .controls-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.4) 60%, rgba(0,0,0,0) 100%);
            padding: 30px 20px 15px 20px;
            opacity: 0;
            transform: translateY(5px);
            transition: all 0.25s ease;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .video-stage:hover .controls-overlay,
        .video-stage:focus-within .controls-overlay {
            opacity: 1;
            transform: translateY(0);
        }

        /* Modern Slim Scrub Bar */
        .timeline-container {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
            cursor: pointer;
            position: relative;
            transition: height 0.15s ease;
        }
        .timeline-container:hover {
            height: 6px;
        }
        .timeline-bar {
            height: 100%;
            background: var(--accent);
            width: 0%;
            border-radius: 2px;
            position: relative;
        }

        /* Button Control Bar Alignment */
        .control-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .ctrl-btn {
            background: none;
            border: none;
            color: var(--text-main);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.85;
            transition: opacity 0.2s, transform 0.1s;
        }
        .ctrl-btn:hover {
            opacity: 1;
            transform: scale(1.05);
        }
        .ctrl-btn svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
        }

        /* Custom Volume Slider Structure */
        .volume-box {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .volume-slider {
            -webkit-appearance: none;
            appearance: none;
            width: 60px;
            height: 3px;
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
            outline: none;
            cursor: pointer;
        }
        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--text-main);
            cursor: pointer;
        }

        /* TIME & STATUS LABELS */
        .time-label {
            font-size: 10px;
            color: #94a3b8;
            font-family: monospace;
        }

        /* STATE SYSTEM FOR FULLSCREEN SCALING INTERFACE */
        :-webkit-full-screen .watermark-overlay {
            width: 110px !important;
            bottom: 85px !important;
            left: 35px !important;
            opacity: 0.4 !important;
        }
        :-ms-fullscreen .watermark-overlay {
            width: 110px !important;
            bottom: 85px !important;
            left: 35px !important;
            opacity: 0.4 !important;
        }
        :fullscreen .watermark-overlay {
            width: 110px !important;
            bottom: 85px !important;
            left: 35px !important;
            opacity: 0.4 !important;
        }

        footer {
            margin-top: 15px;
            font-size: 9px;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

    <div class="dashboard-header">
        <div class="brand-zone">
            <h1>MAHIN TV LIVE</h1>
            <p>Watch FIFA World Cup</p>
        </div>
        <!-- Real-time Buffer / Network Speed Monitor -->
        <div class="stats-badge">
            <span>Buffer Speed:</span> <div id="speed-meter">0.00 Mbps</div>
        </div>
    </div>

    <!-- Main Player Canvas -->
    <div class="video-stage" id="player-view">
        <video id="video-core" playsinline muted autoplay></video>
        
        <!-- Premium Low Transparency Adaptive Logo -->
        <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEjh6LLHibQeG5umPVB9WcSdTC9M5dbf8ABfVyS2RNWbti1RkzQD_fChyphenhyphenfzYcFmnGb5c5nhBulfLEgpo4OXBymC5oCf959_9Y96uQviPxEL9TLmrnhnBuovCELV3E4WQiwBKjZL-e9iq0GhlqO6Prd3orcMKKlV2sBpNynRnp2BDHqGQGIfQ-5gtpkNPwJc/s1600/fwclogo.png" 
             class="watermark-overlay" alt="Stream Watermark">

        <!-- Custom Controls Dashboard Matrix -->
        <div class="controls-overlay">
            <div class="timeline-container" id="timeline-track">
                <div class="timeline-bar" id="timeline-progress"></div>
            </div>
            
            <div class="control-row">
                <div class="control-group">
                    <!-- Play/Pause Toggle -->
                    <button class="ctrl-btn" id="play-toggle" title="Play/Pause">
                        <svg viewBox="0 0 24 24" id="play-icon"><path d="M8 5v14l11-7z"/></svg>
                        <svg viewBox="0 0 24 24" id="pause-icon" style="display:none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                    </button>

                    <!-- Sound/Volume Control Cluster -->
                    <div class="volume-box">
                        <button class="ctrl-btn" id="mute-toggle" title="Mute/Unmute">
                            <svg viewBox="0 0 24 24" id="vol-on"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
                            <svg viewBox="0 0 24 24" id="vol-mute" style="display:none;"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.21.05-.42.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>
                        </button>
                        <input type="range" class="volume-slider" id="volume-control" min="0" max="1" step="0.05" value="0">
                    </div>

                    <!-- Live Stream Identifier -->
                    <div class="time-label"><span style="color:#ef4444; margin-right:4px;">●</span>LIVE</div>
                </div>

                <div class="control-group">
                    <!-- Modern Tool 1: Instant Snapshot Camera -->
                    <button class="ctrl-btn" id="screenshot-btn" title="Take Screenshot">
                        <svg viewBox="0 0 24 24"><path d="M9 2L7.17 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2h-3.17L15 2H9zm3 15c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5z"/></svg>
                    </button>

                    <!-- Modern Tool 2: Floating Picture-in-Picture -->
                    <button class="ctrl-btn" id="pip-btn" title="Picture in Picture">
                        <svg viewBox="0 0 24 24"><path d="M19 11h-8v6h8v-6zm4 8V4.98C23 3.88 22.1 3 21 3H3c-1.1 0-2 .88-2 1.98V19c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2zm-2 .02H3V4.97h18v14.05z"/></svg>
                    </button>

                    <!-- Full Screen -->
                    <button class="ctrl-btn" id="fullscreen-toggle" title="Toggle Fullscreen">
                        <svg viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <footer>
        &copy; 2026 MAHIN TV LIVE • Happy Watching
    </footer>

    <script>
        const video = document.getElementById('video-core');
        const streamUrl = "http://198.195.239.50:8095/tsports/tracks-v1a1/mono.m3u8";
        
        // Custom UI DOM Elements
        const playerView = document.getElementById('player-view');
        const playToggle = document.getElementById('play-toggle');
        const playIcon = document.getElementById('play-icon');
        const pauseIcon = document.getElementById('pause-icon');
        const muteToggle = document.getElementById('mute-toggle');
        const volOn = document.getElementById('vol-on');
        const volMute = document.getElementById('vol-mute');
        const volumeControl = document.getElementById('volume-control');
        const fullscreenToggle = document.getElementById('fullscreen-toggle');
        const pipBtn = document.getElementById('pip-btn');
        const screenshotBtn = document.getElementById('screenshot-btn');
        const speedMeter = document.getElementById('speed-meter');
        const timelineProgress = document.getElementById('timeline-progress');
        const timelineTrack = document.getElementById('timeline-track');

        // Setup HLS Stream Core
        if (Hls.isSupported()) {
            const hls = new Hls({
                enableWorker: true,
                lowLatencyMode: true
            });
            hls.loadSource(streamUrl);
            hls.attachMedia(video);
            
            // Measure network buffer download speeds in real time
            hls.on(Hls.Events.FRAG_LOADED, function(event, data) {
                if(data.stats && data.stats.loading && data.stats.loading.start) {
                    const durationInSeconds = (data.stats.loading.end - data.stats.loading.start) / 1000;
                    const bitsLoaded = data.stats.total;
                    if(durationInSeconds > 0) {
                        const mbps = ((bitsLoaded * 8) / (durationInSeconds * 1000000));
                        speedMeter.innerText = mbps.toFixed(2) + " Mbps";
                    }
                }
            });
        } else if (video.canPlayType('application/x-mpegURL')) {
            video.src = streamUrl;
        }

        // Custom Play/Pause Toggles
        function togglePlay() {
            if (video.paused) {
                video.play();
                playIcon.style.display = 'none';
                pauseIcon.style.display = 'block';
            } else {
                video.pause();
                playIcon.style.display = 'block';
                pauseIcon.style.display = 'none';
            }
        }
        playToggle.addEventListener('click', togglePlay);
        video.addEventListener('click', togglePlay);

        // Double Click for Fullscreen Handling + Auto Orientation
        video.addEventListener('dblclick', function(e) {
            e.preventDefault();
            toggleFullscreen();
        });
        fullscreenToggle.addEventListener('click', toggleFullscreen);

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                playerView.requestFullscreen().then(() => {
                    if (screen.orientation && screen.orientation.lock) {
                        screen.orientation.lock('landscape').catch(() => {});
                    }
                }).catch(err => console.log(err));
            } else {
                document.exitFullscreen();
                if (screen.orientation && screen.orientation.unlock) {
                    screen.orientation.unlock();
                }
            }
        }

        // Custom Sound System Initialization (Muted default behavior to pass autoplay blockades)
        volumeControl.addEventListener('input', (e) => {
            video.volume = e.target.value;
            if (video.volume === 0) {
                video.muted = true;
                volOn.style.display = 'none';
                volMute.style.display = 'block';
            } else {
                video.muted = false;
                volOn.style.display = 'block';
                volMute.style.display = 'none';
            }
        });

        muteToggle.addEventListener('click', () => {
            if (video.muted) {
                video.muted = false;
                volumeControl.value = video.volume || 0.5;
                video.volume = volumeControl.value;
                volOn.style.display = 'block';
                volMute.style.display = 'none';
            } else {
                video.muted = true;
                volumeControl.value = 0;
                volOn.style.display = 'none';
                volMute.style.display = 'block';
            }
        });

        // Picture-In-Picture Feature
        pipBtn.addEventListener('click', async () => {
            try {
                if (video !== document.pictureInPictureElement) {
                    await video.requestPictureInPicture();
                } else {
                    await document.exitPictureInPicture();
                }
            } catch (error) {
                console.error("PiP Mode Failed: ", error);
            }
        });

        // Modern Snapshot Feature
        screenshotBtn.addEventListener('click', () => {
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth || 1280;
            canvas.height = video.videoHeight || 720;
            const ctx = canvas.getContext('2d');
            
            // Render current Frame inside a standard data download element
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            const link = document.createElement('a');
            link.download = `MAHIN-TV-Live-Capture-${Date.now()}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
        });

        // Continuous Progress bar tracking for custom stream timeline UI
        video.addEventListener('timeupdate', () => {
            if (video.duration) {
                const percentage = (video.currentTime / video.duration) * 100;
                timelineProgress.style.width = `${percentage}%`;
            } else {
                timelineProgress.style.width = '100%'; // Full bar indicating Live Stream Feed state
            }
        });
    </script>
</body>
</html>
