<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAHIN TV Live</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.4.12/hls.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Orbitron:wght@700;900&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #080c14;
    --surface: #0f1623;
    --card: #131b2e;
    --border: #1e2d47;
    --accent: #00c8ff;
    --accent2: #0077ff;
    --gold: #f5a623;
    --text: #e2e8f0;
    --muted: #64748b;
    --success: #22c55e;
    --danger: #ef4444;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 12px;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* HEADER */
  header {
    position: sticky;
    top: 0;
    z-index: 1000;
    background: rgba(8,12,20,0.95);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 20px;
    height: 52px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo {
    font-family: 'Orbitron', sans-serif;
    font-size: 17px;
    font-weight: 900;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 1px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .logo-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 1.5s ease-in-out infinite;
    flex-shrink: 0;
  }

  @keyframes pulse {
    0%,100% { opacity:1; transform:scale(1); box-shadow: 0 0 0 0 rgba(0,200,255,0.5); }
    50% { opacity:0.7; transform:scale(1.2); box-shadow: 0 0 0 6px rgba(0,200,255,0); }
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 11px;
    color: var(--muted);
  }

  .live-badge {
    background: var(--danger);
    color: #fff;
    font-size: 10px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 3px;
    letter-spacing: 1px;
    animation: blink 2s ease-in-out infinite;
  }

  @keyframes blink {
    0%,100% { opacity:1; }
    50% { opacity:0.6; }
  }

  /* MAIN LAYOUT */
  .main {
    display: grid;
    grid-template-columns: 1fr 300px;
    grid-template-rows: auto 1fr;
    gap: 12px;
    padding: 12px;
    max-width: 1400px;
    margin: 0 auto;
  }

  /* PLAYER SECTION */
  .player-section {
    grid-column: 1;
    grid-row: 1 / 3;
    position: sticky;
    top: 64px;
    height: calc(100vh - 76px);
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  /* VIDEO WRAPPER */
  .video-wrapper {
    position: relative;
    background: #000;
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid var(--border);
    flex: 1;
    min-height: 0;
    box-shadow: 0 0 40px rgba(0,120,255,0.1);
  }

  video {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
    background: #000;
  }

  /* WATERMARK */
  .watermark {
    position: absolute;
    bottom: 52px;
    left: 12px;
    font-family: 'Orbitron', sans-serif;
    font-size: 11px;
    font-weight: 700;
    color: rgba(255,255,255,0.35);
    text-shadow: 0 0 8px rgba(0,200,255,0.5);
    letter-spacing: 1px;
    pointer-events: none;
    z-index: 10;
    user-select: none;
    transition: font-size 0.3s, bottom 0.3s, left 0.3s;
  }

  .video-wrapper:fullscreen .watermark,
  .video-wrapper:-webkit-full-screen .watermark {
    font-size: 20px;
    bottom: 70px;
    left: 22px;
  }

  /* LOADING OVERLAY */
  .loading-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.85);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    z-index: 20;
    transition: opacity 0.4s;
  }

  .loading-overlay.hidden { opacity: 0; pointer-events: none; }

  .spinner {
    width: 40px; height: 40px;
    border: 3px solid rgba(0,200,255,0.2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    font-size: 11px;
    color: var(--accent);
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* ERROR OVERLAY */
  .error-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.9);
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    z-index: 20;
  }

  .error-overlay.show { display: flex; }

  .error-icon { font-size: 32px; }

  .error-text {
    font-size: 12px;
    color: var(--danger);
    font-weight: 500;
  }

  .retry-btn {
    background: var(--accent2);
    color: #fff;
    border: none;
    padding: 6px 16px;
    border-radius: 5px;
    font-size: 11px;
    cursor: pointer;
    font-weight: 600;
    margin-top: 4px;
    transition: background 0.2s;
  }

  .retry-btn:hover { background: var(--accent); }

  /* CUSTOM CONTROLS */
  .controls {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: linear-gradient(transparent, rgba(0,0,0,0.92));
    padding: 30px 12px 10px;
    display: flex;
    align-items: center;
    gap: 10px;
    z-index: 15;
    transition: opacity 0.3s;
  }

  .video-wrapper:not(:hover) .controls { opacity: 0; }
  .video-wrapper:hover .controls { opacity: 1; }

  .ctrl-btn {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.15);
    color: #fff;
    border-radius: 5px;
    width: 28px; height: 28px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    font-size: 12px;
    transition: background 0.2s, border-color 0.2s;
    flex-shrink: 0;
  }

  .ctrl-btn:hover {
    background: rgba(0,200,255,0.2);
    border-color: var(--accent);
  }

  .ctrl-btn.active {
    background: rgba(0,200,255,0.3);
    border-color: var(--accent);
    color: var(--accent);
  }

  .volume-wrap {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .volume-slider {
    -webkit-appearance: none;
    width: 70px; height: 3px;
    background: rgba(255,255,255,0.2);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }

  .volume-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px; height: 12px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
  }

  .ctrl-sep { flex: 1; }

  .quality-select {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    color: #fff;
    font-size: 10px;
    padding: 3px 6px;
    border-radius: 4px;
    cursor: pointer;
    outline: none;
    font-family: 'Inter', sans-serif;
  }

  .quality-select option { background: #0f1623; color: #fff; }

  .channel-label {
    font-size: 10px;
    color: rgba(255,255,255,0.7);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 150px;
    font-weight: 500;
  }

  /* PLAYER META BAR */
  .player-meta {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }

  .now-playing {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .now-playing-dot {
    width: 6px; height: 6px;
    background: var(--success);
    border-radius: 50%;
    animation: pulse 1.5s infinite;
    flex-shrink: 0;
  }

  .now-playing-name {
    font-size: 12px;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 250px;
  }

  .now-playing-sub {
    font-size: 10px;
    color: var(--muted);
  }

  .pip-btn {
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    color: #fff;
    border: none;
    padding: 5px 12px;
    border-radius: 5px;
    font-size: 10px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: opacity 0.2s, transform 0.1s;
    white-space: nowrap;
  }

  .pip-btn:hover { opacity: 0.85; transform: translateY(-1px); }

  /* RIGHT SIDE */
  .sidebar {
    grid-column: 2;
    grid-row: 1 / 3;
    display: flex;
    flex-direction: column;
    gap: 10px;
    max-height: calc(100vh - 76px);
    position: sticky;
    top: 64px;
    overflow: hidden;
  }

  .search-box {
    position: relative;
  }

  .search-input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 12px 8px 32px;
    border-radius: 7px;
    font-size: 11px;
    outline: none;
    font-family: 'Inter', sans-serif;
    transition: border-color 0.2s;
  }

  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--muted); }

  .search-icon {
    position: absolute;
    left: 10px; top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 12px;
    pointer-events: none;
  }

  .channel-list-wrap {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
  }

  .channel-list-wrap::-webkit-scrollbar { width: 3px; }
  .channel-list-wrap::-webkit-scrollbar-track { background: transparent; }
  .channel-list-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .channel-item {
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 8px 10px;
    border-radius: 7px;
    cursor: pointer;
    transition: background 0.15s;
    border: 1px solid transparent;
    margin-bottom: 3px;
  }

  .channel-item:hover {
    background: var(--card);
    border-color: var(--border);
  }

  .channel-item.active {
    background: linear-gradient(135deg, rgba(0,119,255,0.15), rgba(0,200,255,0.08));
    border-color: rgba(0,200,255,0.3);
  }

  .ch-icon {
    width: 36px; height: 36px;
    border-radius: 6px;
    background: var(--card);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
    flex-shrink: 0;
    overflow: hidden;
    font-weight: 700;
    color: var(--accent);
    font-family: 'Orbitron', sans-serif;
  }

  .ch-info { flex: 1; min-width: 0; }

  .ch-name {
    font-size: 11px;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .ch-tag {
    font-size: 9px;
    color: var(--muted);
    margin-top: 1px;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .ch-live-dot {
    width: 5px; height: 5px;
    background: var(--success);
    border-radius: 50%;
    flex-shrink: 0;
  }

  .ch-idx {
    font-size: 9px;
    color: var(--muted);
    flex-shrink: 0;
    width: 18px;
    text-align: right;
  }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 24px; right: 24px;
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 16px;
    border-radius: 8px;
    font-size: 11px;
    font-weight: 500;
    z-index: 9999;
    transform: translateY(80px);
    opacity: 0;
    transition: all 0.35s cubic-bezier(.34,1.56,.64,1);
    max-width: 280px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.4);
    border-left: 3px solid var(--accent);
  }

  .toast.show { transform: translateY(0); opacity: 1; }

  /* FOOTER */
  footer {
    text-align: center;
    padding: 16px;
    font-size: 10px;
    color: var(--muted);
    border-top: 1px solid var(--border);
    margin-top: 6px;
  }

  footer span { color: var(--accent); font-weight: 600; }

  /* SCROLLBAR GLOBAL */
  * { scrollbar-width: thin; scrollbar-color: var(--border) transparent; }

  /* RESPONSIVE */
  @media (max-width: 900px) {
    .main {
      grid-template-columns: 1fr;
      grid-template-rows: auto auto;
      padding: 8px;
      gap: 8px;
    }
    .player-section {
      grid-column: 1; grid-row: 1;
      position: static;
      height: auto;
    }
    .video-wrapper { aspect-ratio: 16/9; flex: none; height: auto; }
    .sidebar {
      grid-column: 1; grid-row: 2;
      position: static;
      max-height: 400px;
    }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-dot"></div>
    MAHIN TV LIVE
  </div>
  <div class="header-right">
    <span class="live-badge">● LIVE</span>
    <span id="channelCount">Loading...</span>
    <span>Dev: <strong style="color:var(--accent)">Mahin</strong></span>
  </div>
</header>

<div class="main">

  <!-- PLAYER -->
  <div class="player-section">
    <div class="video-wrapper" id="videoWrapper">
      <video id="videoPlayer" playsinline></video>

      <!-- Watermark -->
      <div class="watermark" id="watermark">⚡ MAHIN TV</div>

      <!-- Loading -->
      <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <div class="loading-text">Connecting...</div>
      </div>

      <!-- Error -->
      <div class="error-overlay" id="errorOverlay">
        <div class="error-icon">📡</div>
        <div class="error-text">Stream unavailable</div>
        <div style="font-size:10px;color:var(--muted)">Signal lost or geo-restricted</div>
        <button class="retry-btn" onclick="retryStream()">↺ Retry</button>
      </div>

      <!-- Controls -->
      <div class="controls" id="playerControls">
        <button class="ctrl-btn" id="playPauseBtn" onclick="togglePlay()" title="Play/Pause">▶</button>

        <div class="volume-wrap">
          <button class="ctrl-btn" id="muteBtn" onclick="toggleMute()" title="Mute">🔊</button>
          <input type="range" class="volume-slider" id="volumeSlider" min="0" max="1" step="0.05" value="1" oninput="setVolume(this.value)">
        </div>

        <span class="channel-label" id="ctrlLabel">Select a channel</span>

        <div class="ctrl-sep"></div>

        <select class="quality-select" id="qualitySelect" onchange="setQuality(this.value)" title="Quality">
          <option value="-1">Auto HD</option>
        </select>

        <button class="ctrl-btn" id="fullscreenBtn" onclick="toggleFullscreen()" title="Fullscreen">⛶</button>
      </div>
    </div>

    <!-- Meta bar -->
    <div class="player-meta">
      <div class="now-playing">
        <div class="now-playing-dot" id="nowDot" style="background:var(--muted)"></div>
        <div>
          <div class="now-playing-name" id="nowPlayingName">Choose a channel to begin</div>
          <div class="now-playing-sub" id="nowPlayingSub">MAHIN TV Live • HD Streaming</div>
        </div>
      </div>
      <button class="pip-btn" onclick="togglePiP()" title="Picture in Picture">⧉ PiP</button>
    </div>
  </div>

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input type="text" class="search-input" id="searchInput" placeholder="Search channels..." oninput="filterChannels(this.value)">
    </div>
    <div class="channel-list-wrap">
      <div id="channelList"></div>
    </div>
  </div>

</div>

<footer>
  &copy; 2026 <span>MAHIN TV LIVE</span> — Developed by <span>Mahin</span> &nbsp;|&nbsp; All streams are publicly available links
</footer>

<div class="toast" id="toast"></div>

<script>
// ─── M3U DATA ────────────────────────────────────────────────────────────────
const M3U_URL = 'https://raw.githubusercontent.com/subirkumarpaul/Subirmaxpro/refs/heads/main/Subirmaxpro';

let channels = [];
let currentIndex = -1;
let hls = null;
let currentStreamUrl = '';
let retryTimeout = null;

// ─── PARSE M3U ────────────────────────────────────────────────────────────────
async function loadChannels() {
  try {
    const r = await fetch(M3U_URL);
    const text = await r.text();
    channels = parseM3U(text).filter(c => c.name.trim());
    document.getElementById('channelCount').textContent = channels.length + ' channels';
    renderChannels(channels);
    // Auto-load first channel
    if (channels.length > 0) playChannel(0);
  } catch (e) {
    document.getElementById('channelCount').textContent = 'Load error';
    showToast('⚠️ Failed to load channel list');
  }
}

function parseM3U(text) {
  const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
  const result = [];
  for (let i = 0; i < lines.length; i++) {
    if (lines[i].startsWith('#EXTINF')) {
      const nameMatch = lines[i].match(/,(.+)$/);
      const name = nameMatch ? nameMatch[1].trim() : 'Unknown';
      const url = lines[i+1] && !lines[i+1].startsWith('#') ? lines[i+1] : '';
      if (url) {
        result.push({ name, url });
        i++;
      }
    }
  }
  return result;
}

// ─── ICONS ───────────────────────────────────────────────────────────────────
function getChannelIcon(name) {
  const n = name.toLowerCase();
  if (n.includes('bein') || n.includes('beIN')) return '⚽';
  if (n.includes('cricket') || n.includes('star') && n.includes('sport')) return '🏏';
  if (n.includes('espn')) return '🏈';
  if (n.includes('fox')) return '🦊';
  if (n.includes('btv') || n.includes('bangladesh') || n.includes('🇧🇩')) return '🇧🇩';
  if (n.includes('red bull')) return '🐂';
  if (n.includes('tennis')) return '🎾';
  if (n.includes('golf')) return '⛳';
  if (n.includes('quran') || n.includes('sunnah')) return '☪️';
  if (n.includes('world cup') || n.includes('fifa') || n.includes('fwc')) return '🏆';
  if (n.includes('sport')) return '🏅';
  return name.substring(0,2).toUpperCase();
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function renderChannels(list) {
  const container = document.getElementById('channelList');
  container.innerHTML = '';
  list.forEach((ch, i) => {
    const realIdx = channels.indexOf(ch);
    const div = document.createElement('div');
    div.className = 'channel-item' + (realIdx === currentIndex ? ' active' : '');
    div.id = 'ch-' + realIdx;
    div.onclick = () => playChannel(realIdx);

    const icon = getChannelIcon(ch.name);
    const isText = icon.length <= 2 && !/\p{Emoji}/u.test(icon);

    div.innerHTML = `
      <div class="ch-icon">${icon}</div>
      <div class="ch-info">
        <div class="ch-name">${esc(ch.name)}</div>
        <div class="ch-tag"><span class="ch-live-dot"></span>LIVE</div>
      </div>
      <div class="ch-idx">${realIdx+1}</div>
    `;
    container.appendChild(div);
  });
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function filterChannels(q) {
  const filtered = q.trim()
    ? channels.filter(c => c.name.toLowerCase().includes(q.toLowerCase()))
    : channels;
  renderChannels(filtered);
}

// ─── PLAY ─────────────────────────────────────────────────────────────────────
function playChannel(idx) {
  if (idx < 0 || idx >= channels.length) return;
  currentIndex = idx;
  const ch = channels[idx];
  currentStreamUrl = ch.url;

  // Update UI
  document.querySelectorAll('.channel-item').forEach(el => el.classList.remove('active'));
  const el = document.getElementById('ch-' + idx);
  if (el) {
    el.classList.add('active');
    el.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  }

  document.getElementById('nowPlayingName').textContent = ch.name;
  document.getElementById('nowPlayingSub').textContent = 'MAHIN TV Live • Channel ' + (idx+1);
  document.getElementById('ctrlLabel').textContent = ch.name;
  document.getElementById('nowDot').style.background = 'var(--success)';
  document.getElementById('playPauseBtn').textContent = '⏸';

  showLoading(true);
  hideError();
  clearRetry();

  // Load stream
  loadStream(ch.url);
  showToast('📺 ' + ch.name);
}

function loadStream(url) {
  const video = document.getElementById('videoPlayer');

  // Destroy old HLS
  if (hls) { hls.destroy(); hls = null; }
  video.pause();

  const isHLS = url.includes('.m3u8') || url.includes('.m3u');
  const isMPD = url.includes('.mpd');
  const isTS = url.endsWith('.ts') || url.includes('/ts') || url.includes('/live/');

  if (isHLS && Hls.isSupported()) {
    hls = new Hls({
      maxBufferLength: 30,
      maxMaxBufferLength: 60,
      enableWorker: true,
      lowLatencyMode: true,
      manifestLoadingTimeOut: 15000,
      manifestLoadingMaxRetry: 3,
    });
    hls.loadSource(url);
    hls.attachMedia(video);
    hls.on(Hls.Events.MANIFEST_PARSED, (e, data) => {
      showLoading(false);
      populateQuality(data.levels);
      video.play().catch(() => {});
    });
    hls.on(Hls.Events.ERROR, (e, data) => {
      if (data.fatal) handleStreamError();
    });
  } else if (video.canPlayType('application/vnd.apple.mpegurl') && isHLS) {
    video.src = url;
    video.load();
    video.play().then(() => showLoading(false)).catch(handleStreamError);
  } else if (isMPD) {
    // DASH fallback - try direct src
    video.src = url;
    video.load();
    video.play().then(() => showLoading(false)).catch(handleStreamError);
  } else {
    // Direct stream (TS, MP4, etc.)
    video.src = url;
    video.load();
    video.addEventListener('canplay', () => showLoading(false), { once: true });
    video.play().catch(() => {});
  }

  video.onerror = handleStreamError;

  // Timeout fallback
  retryTimeout = setTimeout(() => {
    if (document.getElementById('loadingOverlay').classList.contains('hidden') === false) {
      handleStreamError();
    }
  }, 20000);
}

function handleStreamError() {
  showLoading(false);
  showError();
  document.getElementById('nowDot').style.background = 'var(--danger)';
  clearRetry();
}

function clearRetry() {
  if (retryTimeout) { clearTimeout(retryTimeout); retryTimeout = null; }
}

function retryStream() {
  if (currentStreamUrl) {
    hideError();
    showLoading(true);
    clearRetry();
    // Try next channel if this fails
    loadStream(currentStreamUrl);
  }
}

// ─── QUALITY ─────────────────────────────────────────────────────────────────
function populateQuality(levels) {
  const sel = document.getElementById('qualitySelect');
  sel.innerHTML = '<option value="-1">Auto HD</option>';
  levels.forEach((l, i) => {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = (l.height ? l.height + 'p' : '') + (l.bitrate ? ' ' + Math.round(l.bitrate/1000) + 'k' : '');
    sel.appendChild(opt);
  });
}

function setQuality(val) {
  if (!hls) return;
  hls.currentLevel = parseInt(val);
  showToast('🎬 Quality: ' + (val == -1 ? 'Auto HD' : document.getElementById('qualitySelect').options[document.getElementById('qualitySelect').selectedIndex].text));
}

// ─── CONTROLS ────────────────────────────────────────────────────────────────
const video = document.getElementById('videoPlayer');

function togglePlay() {
  if (video.paused) {
    video.play();
    document.getElementById('playPauseBtn').textContent = '⏸';
  } else {
    video.pause();
    document.getElementById('playPauseBtn').textContent = '▶';
  }
}

function toggleMute() {
  video.muted = !video.muted;
  document.getElementById('muteBtn').textContent = video.muted ? '🔇' : '🔊';
}

function setVolume(v) {
  video.volume = parseFloat(v);
  video.muted = v == 0;
  document.getElementById('muteBtn').textContent = v == 0 ? '🔇' : '🔊';
}

function toggleFullscreen() {
  const wrapper = document.getElementById('videoWrapper');
  if (!document.fullscreenElement) {
    (wrapper.requestFullscreen || wrapper.webkitRequestFullscreen || wrapper.mozRequestFullScreen).call(wrapper);
  } else {
    (document.exitFullscreen || document.webkitExitFullscreen).call(document);
  }
}

async function togglePiP() {
  try {
    if (document.pictureInPictureElement) {
      await document.exitPictureInPicture();
      showToast('⧉ PiP closed');
    } else {
      await video.requestPictureInPicture();
      showToast('⧉ Picture-in-Picture active');
    }
  } catch (e) {
    showToast('⚠️ PiP not supported in this browser');
  }
}

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
  if (e.code === 'KeyM') toggleMute();
  if (e.code === 'KeyF') toggleFullscreen();
  if (e.code === 'ArrowUp' && currentIndex > 0) playChannel(currentIndex - 1);
  if (e.code === 'ArrowDown' && currentIndex < channels.length - 1) playChannel(currentIndex + 1);
});

// ─── WATERMARK FULLSCREEN ────────────────────────────────────────────────────
document.addEventListener('fullscreenchange', updateWatermarkForFullscreen);
document.addEventListener('webkitfullscreenchange', updateWatermarkForFullscreen);

function updateWatermarkForFullscreen() {
  const wm = document.getElementById('watermark');
  if (document.fullscreenElement) {
    wm.style.fontSize = '20px';
    wm.style.bottom = '70px';
    wm.style.left = '22px';
  } else {
    wm.style.fontSize = '';
    wm.style.bottom = '';
    wm.style.left = '';
  }
}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function showLoading(v) {
  document.getElementById('loadingOverlay').classList.toggle('hidden', !v);
}

function showError() {
  document.getElementById('errorOverlay').classList.add('show');
}

function hideError() {
  document.getElementById('errorOverlay').classList.remove('show');
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
loadChannels();
</script>
